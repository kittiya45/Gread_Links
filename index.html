<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream:      #faf8f5;
      --white:      #ffffff;
      --ink:        #1a1714;
      --ink-mid:    #5a5550;
      --ink-soft:   #9a9590;
      --ink-ghost:  #cdc9c3;
      --indigo:     #4f46e5;
      --indigo-lt:  #eef2ff;
      --indigo-mid: #6366f1;
      --rose:       #e11d48;
      --rose-lt:    #fff1f2;
      --rose-mid:   #fb7185;
      --teal:       #0d9488;
      --teal-lt:    #ccdffb;
      --amber:      #d97706;
      --shadow-sm:  0 1px 3px rgba(26,23,20,0.08), 0 1px 2px rgba(26,23,20,0.04);
      --shadow-md:  0 4px 16px rgba(26,23,20,0.08), 0 2px 6px rgba(26,23,20,0.05);
      --shadow-lg:  0 20px 48px rgba(26,23,20,0.1), 0 8px 16px rgba(26,23,20,0.06);
      --shadow-xl:  0 32px 64px rgba(26,23,20,0.12), 0 12px 24px rgba(26,23,20,0.07);
      --r-xl: 28px;
      --r-lg: 20px;
      --r-md: 14px;
      --r-sm: 10px;
      --r-xs: 7px;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html { font-size: 16px; }

    body {
      font-family: 'Kanit', sans-serif;
      background: var(--cream);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px 72px;
      position: relative;
      overflow-x: hidden;
    }

    /* Layered background texture */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 10%, rgba(79,70,229,0.04) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(13,148,136,0.04) 0%, transparent 60%),
        radial-gradient(ellipse 100% 80% at 50% 50%, rgba(255,255,255,0.6) 0%, transparent 100%);
      pointer-events: none; z-index: 0;
    }

    .wrapper {
      width: 100%; max-width: 440px;
      position: relative; z-index: 1;
    }

    /* ═══════════════════════════════ HEADER ═══ */
    .app-header {
      text-align: center;
      margin-bottom: 32px;
      animation: riseIn 0.7s cubic-bezier(0.22,1,0.36,1) both;
    }

    .logo-ring {
      width: 72px; height: 72px;
      margin: 0 auto 20px;
      position: relative;
    }

    .logo-ring svg {
      position: absolute; inset: 0;
      animation: rotateSlow 20s linear infinite;
    }

    .logo-inner {
      position: absolute; inset: 10px;
      background: var(--white);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      box-shadow: var(--shadow-md), inset 0 1px 0 rgba(255,255,255,0.9);
    }

    .app-header h1 {
      font-family: 'Kanit', sans-serif;
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--ink);
      line-height: 1.15;
      letter-spacing: -0.5px;
    }

    .app-header h1 .accent {
      background: linear-gradient(135deg, var(--indigo) 0%, var(--indigo-mid) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .app-header .meta {
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 0.8rem;
      color: var(--ink-soft);
      font-weight: 400;
    }

    .meta-dot {
      width: 3px; height: 3px;
      background: var(--ink-ghost);
      border-radius: 50%;
    }

    .meta-tag {
      background: var(--indigo-lt);
      color: var(--indigo);
      font-size: 0.72rem;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 999px;
      letter-spacing: 0.3px;
    }

    /* ═══════════════════════════════ CARD ═══ */
    .main-card {
      background: var(--white);
      border-radius: var(--r-xl);
      padding: 0;
      box-shadow: var(--shadow-xl);
      border: 1px solid rgba(26,23,20,0.06);
      overflow: hidden;
      animation: riseIn 0.7s 0.08s cubic-bezier(0.22,1,0.36,1) both;
    }

    /* Card header strip */
    .card-top {
      background: linear-gradient(135deg, #4f46e5 0%, #6366f1 50%, #7c3aed 100%);
      padding: 22px 28px;
      position: relative;
      overflow: hidden;
    }

    .card-top::before {
      content: '';
      position: absolute;
      width: 200px; height: 200px;
      background: rgba(255,255,255,0.06);
      border-radius: 50%;
      top: -80px; right: -40px;
    }

    .card-top::after {
      content: '';
      position: absolute;
      width: 120px; height: 120px;
      background: rgba(255,255,255,0.04);
      border-radius: 50%;
      bottom: -40px; left: 20px;
    }

    .card-top-label {
      font-size: 0.72rem;
      font-weight: 600;
      color: rgba(255,255,255,0.6);
      letter-spacing: 1.2px;
      text-transform: uppercase;
      margin-bottom: 4px;
      position: relative; z-index: 1;
      text-align: center;
    }

    .card-top-title {
      font-family: 'Kanit', sans-serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: #fff;
      position: relative; z-index: 1;
      text-align: center;
    }

    /* Form body */
    .card-body { padding: 28px; }

    /* ═══════════════════════════════ FORM ═══ */
    .field-group {
      margin-bottom: 20px;
    }

    .input-label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--ink-mid);
      margin-bottom: 8px;
      letter-spacing: 0.4px;
    }

    .input-wrap {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 14px; top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      pointer-events: none;
      opacity: 0.4;
    }

    .input-field {
      width: 100%;
      height: 50px;
      background: var(--cream);
      border: 1.5px solid var(--ink-ghost);
      border-radius: var(--r-md);
      padding: 0 16px 0 42px;
      font-size: 0.97rem;
      font-family: 'Kanit', sans-serif;
      color: var(--ink);
      font-weight: 500;
      transition: all 0.22s ease;
      -webkit-appearance: none; appearance: none;
    }

    .input-field::placeholder { color: var(--ink-ghost); font-weight: 400; }

    .input-field:focus {
      outline: none;
      background: var(--white);
      border-color: var(--indigo);
      box-shadow: 0 0 0 4px rgba(79,70,229,0.1);
    }

    .select-caret {
      position: absolute;
      right: 14px; top: 50%;
      transform: translateY(-50%);
      color: var(--ink-soft);
      font-size: 0.6rem;
      pointer-events: none;
    }

    .input-hint {
      font-size: 0.7rem;
      color: var(--ink-ghost);
      margin-top: 4px;
      font-weight: 400;
      font-style: italic;
    }

    /* ═══════════════════════════════ BUTTON ═══ */
    .btn-submit {
      width: 100%;
      height: 54px;
      background: linear-gradient(135deg, #4338ca 0%, var(--indigo) 40%, var(--indigo-mid) 100%);
      color: #fff;
      border: none;
      border-radius: var(--r-md);
      font-family: 'Kanit', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.2px;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(79,70,229,0.35), inset 0 1px 0 rgba(255,255,255,0.15);
      transition: all 0.2s ease;
      display: flex; align-items: center; justify-content: center; gap: 9px;
      margin-top: 4px;
      position: relative; overflow: hidden;
    }

    .btn-submit::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, transparent 100%);
    }

    .btn-icon { font-size: 1rem; position: relative; }
    .btn-text { position: relative; }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(79,70,229,0.4), inset 0 1px 0 rgba(255,255,255,0.15);
    }
    .btn-submit:active { transform: translateY(0) scale(0.98); }

    /* ═══════════════════════════════ RESULT ═══ */
    #resultBox { margin-top: 24px; }

    .result-wrap {
      animation: riseIn 0.5s cubic-bezier(0.22,1,0.36,1) both;
    }

    /* Student info panel */
    .student-panel {
      background: var(--white);
      border: 1px solid rgba(26,23,20,0.07);
      border-radius: var(--r-lg);
      overflow: hidden;
    }

    .panel-header {
      padding: 12px 16px;
      background: rgba(79,70,229,0.05);
      border-bottom: 1px solid rgba(79,70,229,0.08);
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .panel-header-dot {
      width: 6px; height: 6px;
      background: var(--indigo);
      border-radius: 50%;
    }

    .panel-header-title {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--indigo);
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    .data-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(26,23,20,0.05);
      gap: 16px;
    }
    .data-row:last-child { border-bottom: none; }

    .data-label {
      font-size: 0.8rem;
      color: var(--ink-soft);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .data-value {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--ink);
      text-align: right;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      background: var(--indigo-lt);
      color: var(--indigo);
      font-size: 0.72rem;
      font-weight: 600;
      padding: 2px 9px;
      border-radius: 999px;
    }

    /* ═══════════════════════════════ GRADE DISPLAY ═══ */
    .grade-panel {
      margin-top: 12px;
      border-radius: var(--r-md);
      background: var(--white);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      position: relative;
      padding: 16px 12px;
    }

    .grade-bg {
      display: none;
    }

    .grade-content {
      position: relative;
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      gap: 16px;
    }

    .grade-col {
      flex: 1;
      text-align: center;
    }

    .grade-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--ink-mid);
      margin-bottom: 4px;
    }

    .grade-value {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--indigo);
      line-height: 1.1;
    }

    .grade-value.highlight {
      color: var(--indigo);
      font-size: 2.5rem;
      font-weight: 700;
      background: none;
      text-shadow: none;
    }

    .grade-sub {
      margin-top: 4px;
      font-size: 0.72rem;
      color: var(--ink-soft);
    }

    /* ═══════════════════════════════ TEACHER NOTE ═══ */
    .teacher-note {
      margin-top: 12px;
      background: var(--indigo-lt);
      border: 1px solid rgba(79,70,229,0.15);
      border-radius: var(--r-sm);
      padding: 14px 16px;
      display: flex;
      gap: 11px;
      align-items: flex-start;
      position: relative;
      overflow: hidden;
    }

    .teacher-note::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: linear-gradient(180deg, var(--indigo) 0%, var(--indigo-mid) 100%);
      border-radius: 4px 0 0 4px;
    }

    .tnote-icon-wrap {
      width: 30px; height: 30px;
      background: rgba(79,70,229,0.12);
      border-radius: var(--r-xs);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 0.9rem;
      position: relative;
      z-index: 1;
    }

    .tnote-body { flex: 1; position: relative; z-index: 1; }
    .tnote-label {
      font-size: 0.72rem; font-weight: 700;
      color: var(--indigo); letter-spacing: 0.5px;
      text-transform: uppercase; margin-bottom: 3px;
      position: relative;
      z-index: 1;
    }
    .tnote-text {
      font-size: 0.85rem; color: var(--ink); line-height: 1.6;
    }

    /* ═══════════════════════════════ NOTICE BANNER ═══ */
    .notice-banner {
      margin-top: 12px;
      background: var(--rose-lt);
      border: 1px solid rgba(225,29,72,0.12);
      border-radius: var(--r-sm);
      padding: 14px 16px;
      display: flex;
      gap: 11px;
      align-items: flex-start;
      position: relative;
      overflow: hidden;
    }

    .notice-banner::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: linear-gradient(180deg, var(--rose) 0%, #fb7185 100%);
      border-radius: 4px 0 0 4px;
    }

    .notice-icon-wrap {
      width: 30px; height: 30px;
      background: rgba(225,29,72,0.1);
      border-radius: var(--r-xs);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 0.9rem;
    }

    .notice-body { flex: 1; }

    .notice-label {
      font-size: 0.72rem; font-weight: 700;
      color: var(--rose); letter-spacing: 0.5px;
      text-transform: uppercase; margin-bottom: 3px;
    }

    .notice-text {
      font-size: 0.84rem;
      color: #9f1239;
      line-height: 1.65;
    }

    /* ═══════════════════════════════ LOADING ═══ */
    .loading-wrap {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px 0; gap: 14px;
    }

    .loader {
      width: 38px; height: 38px;
      position: relative;
    }

    .loader-ring {
      width: 100%; height: 100%;
      border: 2.5px solid rgba(79,70,229,0.12);
      border-top-color: var(--indigo);
      border-radius: 50%;
      animation: spin 0.8s cubic-bezier(0.6,0.2,0.4,0.8) infinite;
    }

    .loader-dot {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .loader-dot::after {
      content: '';
      width: 6px; height: 6px;
      background: var(--indigo);
      border-radius: 50%;
      opacity: 0.5;
    }

    .loading-text {
      font-size: 0.85rem;
      color: var(--ink-soft);
      letter-spacing: 0.3px;
    }

    /* ═══════════════════════════════ ERROR ═══ */
    .error-box {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px;
      background: var(--rose-lt);
      border: 1px solid rgba(225,29,72,0.1);
      border-radius: var(--r-lg);
      padding: 28px 20px;
      text-align: center;
    }

    .error-emoji { font-size: 2rem; }
    .error-title { font-size: 0.95rem; font-weight: 700; color: var(--rose); }
    .error-sub { font-size: 0.8rem; color: var(--rose-mid); opacity: 0.8; }

    /* ═══════════════════════════════ FOOTER ═══ */
    footer {
      text-align: center;
      margin-top: 30px;
      color: var(--ink-ghost);
      font-size: 0.72rem;
      letter-spacing: 0.5px;
      animation: riseIn 0.7s 0.2s both;
    }

    /* ═══════════════════════════════ ANIMATIONS ═══ */
    @keyframes riseIn {
      from { opacity: 0; transform: translateY(20px) scale(0.99); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes rotateSlow {
      to { transform: rotate(360deg); }
    }

    /* Field stagger */
    .field-group:nth-child(1) { animation: riseIn 0.5s 0.12s both; }
    .field-group:nth-child(2) { animation: riseIn 0.5s 0.20s both; }
    .field-group:nth-child(3) { animation: riseIn 0.5s 0.28s both; }
    .btn-submit               { animation: riseIn 0.5s 0.36s both; }
  </style>
</head>
<body>

<div class="wrapper">

  <!-- HEADER -->
  <div class="app-header">
    <div class="logo-ring">
      <svg viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="36" cy="36" r="34" stroke="url(#grad)" stroke-width="1.5" stroke-dasharray="6 4" stroke-linecap="round"/>
        <defs>
          <linearGradient id="grad" x1="0" y1="0" x2="72" y2="72" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.6"/>
            <stop offset="50%" stop-color="#6366f1" stop-opacity="0.2"/>
            <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.6"/>
          </linearGradient>
        </defs>
      </svg>
      <div class="logo-inner">🎓</div>
    </div>
    <h1>ระบบ<span class="accent">ผลการเรียน</span></h1>
    <div class="meta">
      <span>ภาคเรียนที่ 2</span>
      <span class="meta-dot"></span>
      <span class="meta-tag">ปีการศึกษา 2568</span>
    </div>
  </div>

  <!-- MAIN CARD -->
  <div class="main-card">
    <div class="card-top">
      <div class="card-top-label">กรุณากรอกข้อมูล</div>
      <div class="card-top-title">ตรวจสอบผลการเรียนของคุณ</div>
    </div>

    <div class="card-body">
      <div class="field-group">
        <label class="input-label">เลขประจำตัวนักเรียน</label>
        <div class="input-wrap">
          <span class="input-icon">🪪</span>
          <input id="studentId" type="tel" class="input-field" placeholder="ระบุเลข 5 หลัก ตัวอย่าง: 12345">
        </div>

      </div>

      <div class="field-group">
        <label class="input-label">ชื่อ – นามสกุล</label>
        <div class="input-wrap">
          <span class="input-icon">👤</span>
          <input id="fullName" type="text" class="input-field" placeholder="ไม่ต้องใส่คำนำหน้า ตัวอย่าง: สมชาย ใจดี  ">
        </div>

      </div>

      <div class="field-group">
        <label class="input-label">ชั้นมัธยมศึกษา</label>
        <div class="input-wrap select-wrap">
          <span class="input-icon">🏫</span>
          <select id="room" class="input-field">
            <option value="ม.3/444">ม.3/444</option>
            <option value="ม.3/445">ม.3/445</option>
            <option value="ม.3/446">ม.3/446</option>
            <option value="ม.3/342">ม.3/342</option>
            <option value="ม.3/341">ม.3/341</option>
            <option value="ม.4/144">ม.4/144</option>
            <option value="ม.5/154">ม.5/154</option>
            <option value="ม.5">ม.5</option>
          </select>
          <span class="select-caret">▼</span>
        </div>
      </div>

      <button class="btn-submit" onclick="searchData()">
        <span class="btn-icon">🔍</span>
        <span class="btn-text">ตรวจสอบผลการเรียน</span>
      </button>

      <div id="resultBox"></div>
    </div>
  </div>

  <footer>&copy; 2026 Academic Support System</footer>
</div>

<script>
const SHEET_ID = "1WXq3IRA8Bm2XAAObpfHGkfibZQqOI15iY6ln4EOuydA";

function stripPrefix(name) {
  return name.replace(/^(ด\.ช\.|ด\.ญ\.|นาย|นางสาว|นาง)\s*/, '').trim();
}

async function searchData() {
  const sid       = document.getElementById("studentId").value.trim();
  const nameInput = stripPrefix(document.getElementById("fullName").value.trim());
  const room      = document.getElementById("room").value;
  const box       = document.getElementById("resultBox");

  if (!sid || !nameInput) {
    alert("กรุณากรอกข้อมูลให้ครบถ้วน");
    return;
  }

  box.innerHTML = `
    <div class="loading-wrap">
      <div class="loader">
        <div class="loader-ring"></div>
        <div class="loader-dot"></div>
      </div>
      <p class="loading-text">กำลังดึงข้อมูลจากระบบ…</p>
    </div>`;

  try {
    const url  = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(room)}`;
    console.log("🔗 URL:", url);
    
    const res  = await fetch(url);
    if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
    
    const text = await res.text();
    console.log("📊 Response:", text.substring(0, 200));
    
    // Parse CSV properly handling quoted fields with commas
    const rows = text.split('\n').map(r => {
      const result = [];
      let current = '';
      let inQuotes = false;
      for (let i = 0; i < r.length; i++) {
        const char = r[i];
        if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === ',' && !inQuotes) {
          result.push(current.replace(/^"|"$/g, '').trim());
          current = '';
        } else {
          current += char;
        }
      }
      result.push(current.replace(/^"|"$/g, '').trim());
      return result;
    });
    const data = rows.slice(1);
    console.log("📈 Data rows:", data.length, data);

    const found = data.find(r => {
      const s_id   = (r[1] || "").trim();
      const s_full = stripPrefix((r[3] || "") + " " + (r[4] || ""));
      return s_id === sid && s_full === nameInput;
    });

    if (!found) {
      box.innerHTML = `
        <div class="error-box">
          <span class="error-emoji">🔎</span>
          <p class="error-title">ไม่พบข้อมูลนักเรียน</p>
          <p class="error-sub">กรุณาตรวจสอบชื่อและเลขประจำตัวอีกครั้ง</p>
        </div>`;
      return;
    }

    box.innerHTML = `
      <div class="result-wrap">

        <!-- Student info -->
        <div class="student-panel">
          <div class="panel-header">
            <span class="panel-header-dot"></span>
            <span class="panel-header-title">ข้อมูลนักเรียน</span>
          </div>
          <div class="data-row">
            <span class="data-label">ชื่อ–นามสกุล</span>
            <span class="data-value">${found[3]} ${found[4]}</span>
          </div>
          <div class="data-row">
            <span class="data-label">เลขประจำตัว</span>
            <span class="data-value">
              ${found[1]}
              <span class="pill">เลขที่ ${found[0]}</span>
            </span>
          </div>
          <div class="data-row">
            <span class="data-label">ห้องเรียน</span>
            <span class="data-value">${room}</span>
          </div>
        </div>

        <!-- Grade display -->
        <div class="grade-panel">
          <div class="grade-bg"></div>
          <div class="grade-content">
            <div class="grade-col">
              <div class="grade-label">เกรดเฉลี่ย</div>
              <div class="grade-value">${found[6]}</div>
              <div class="grade-sub">GPA</div>
            </div>
            <div class="grade-col">
              <div class="grade-label">คะแนนรวม</div>
              <div class="grade-value highlight">${found[5]}</div>
              <div class="grade-sub">คะแนน</div>
            </div>
          </div>
        </div>

        ${found[7] ? `
        <div class="teacher-note">
          <div class="tnote-icon-wrap">💬</div>
          <div class="tnote-body">
            <div class="tnote-label">ข้อความจากครู</div>
            <div class="tnote-text">${found[7]}</div>
          </div>
        </div>` : ''}

        <!-- Notice -->
        <div class="notice-banner">
          <div class="notice-icon-wrap">⚠️</div>
          <div class="notice-body">
            <div class="notice-label">หมายเหตุสำคัญ</div>
            <p class="notice-text">นักเรียนที่ติด 0 หรือต้องการแก้ไขคะแนน ให้ดำเนินการส่งงานที่ยังไม่ส่งภายในวันที่ 8 มีนาคมไม่เกินเที่ยงคืน</p>
          </div>
        </div>

      </div>`;

  } catch (e) {
    box.innerHTML = `
      <div class="error-box">
        <span class="error-emoji">⚡</span>
        <p class="error-title">เกิดข้อผิดพลาด</p>
        <p class="error-sub">ไม่สามารถเชื่อมต่อฐานข้อมูลได้</p>
      </div>`;
  }
}
</script>
